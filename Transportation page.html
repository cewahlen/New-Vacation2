<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transportation</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        background-image: url("trans Best-Views-in-New-York-City.jpg");
        background-size: cover; /* makes the image fill the screen */
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
  </head>

  <body>
    <h1
      style="
        font-family: &quot;Courier New&quot;, Courier, monospace;
        font-size: 80px;
        color: white;
        margin: 40px;
        text-align: right;
      "
    >
      Transportation
    </h1>
    <p
      style="
        font-family: &quot;Courier New&quot;, Courier, monospace;
        font-size: 30px;
        color: white;
        font-weight: bold;
        margin: 20px 100px;
        max-width: 500px;
        background: rgba(0, 0, 0, 0.6); /* rectangle behind text */
        padding: 20px; /* space inside rectangle */
        border-radius: 10px; /* optional rounded corners */
      "
    >
      We rented a SUV from our hometown for the whole trip, which was a smooth
      and comfortable journey. Upon arrival, we used public transportation and
      rideshare services to navigate the city efficiently.
    </p>
    <img
      src="Wagoneer.jpg"
      alt="New York City"
      style="
        display: block;
        margin: 20px 100px;
        max-width: 500px;
        border-radius: 10px;
      "
    />
    <img
      src="subway.jpeg"
      alt="New York City"
      style="
        display: block;
        margin: 20px 100px;
        max-width: 500px;
        border-radius: 10px;
      "
    />
    <img
      src="citibike.jpg"
      alt="New York City"
      style="
        display: block;
        margin: 20px 100px;
        max-width: 500px;
        border-radius: 10px;
      "
    />
