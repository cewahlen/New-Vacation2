<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities</title>
    <style>
      body {
        background-image: url("new-york-city-skyline-.jpg");
        background-size: cover; /* makes the image fill the screen */
        background-repeat: no-repeat;
        background-position: center;
      }
      .custom-btn {
        display: inline-flex; /* Allows icon + text alignment */
        align-items: center;
        gap: 8px; /* Space between icon and text */
        padding: 10px 16px;
        background-color: black;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 30px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        text-decoration: none; /* Remove underline from link */
      }

      /* Hover effect */
      .custom-btn:hover {
        background-color: #45a049;
      }

      /* Icon styling */
      .custom-btn img {
        width: 20px;
        height: 20px;
      }

      /* Optional: style text separately */
      .custom-btn span {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1
      style="
        font-family: &quot;Courier New&quot;, Courier, monospace;
        font-size: 80px;
        color: black;
        margin: 40px;
        text-align: left;
    ""
        >
      
     Consulate Visit
      </h1>

       <a href="Vacation.html" class="custom-btn top-left-btn">
      <span>Home</span>
    </a>

    <p
      style="
        font-family: &quot;Courier New&quot;, Courier, monospace;
        font-size: 20px;
        color: white;
        font-weight: bold;
        margin: 20px 100px;
        max-width: 500px;
        background: rgba(0, 0, 0, 0.6); /* rectangle behind text */
        padding: 20px; /* space inside rectangle */
        border-radius: 10px; /* optional rounded corners */
      "
    >
      Our consulate visit was a significant part of our trip, where we renewed our Swedish passports. The process was smooth, and the staff were helpful and efficient.
    </p>
    <img
      src="onedag.jpg"
      alt="New York City"
      style="
        display: block;
        margin: 20px 100px;
        max-width: 600px;
        border-radius: 10px;
      "
    />
    <img
      src="consolate.jpg"
      alt="New York City"
      style="
        display: block;
        margin: 20px 100px;
        max-width: 500px;
        border-radius: 10px;
      "
    />
  </body>
</html>
